name: Quality

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    uses: ./.github/workflows/_php-reusable.yml
    secrets: inherit
    with:
      job_name: PHP lint
      php_version: '8.5'
      command: find src tests -type f -name "*.php" -print0 | xargs -0 -n1 php -l

  cs:
    uses: ./.github/workflows/_php-reusable.yml
    secrets: inherit
    with:
      job_name: PHP CS Fixer
      php_version: '8.5'
      command: vendor/bin/php-cs-fixer fix --dry-run --diff --verbose

  rector:
    uses: ./.github/workflows/_php-reusable.yml
    secrets: inherit
    with:
      job_name: Rector
      php_version: '8.5'
      command: vendor/bin/rector process --dry-run --ansi

  psalm:
    uses: ./.github/workflows/_php-reusable.yml
    secrets: inherit
    with:
      job_name: Psalm
      php_version: '8.5'
      command: vendor/bin/psalm --no-progress
